<div fxLayout="column" fxLayoutAlign="space-between center">
  <div fxLayout="row" fxLayoutAlign="space-between center">
    <p-inputNumber
      placeholder="from"
      mode="decimal"
      [formControl]="fromNumberTimeForm"
      [showButtons]="true"
      [min]="1"
      [max]="100"
    ></p-inputNumber>
    -
    <p-inputNumber
      placeholder="to"
      mode="decimal"
      [formControl]="toNumberTimeForm"
      [showButtons]="true"
      [min]="1"
      [max]="100"
    ></p-inputNumber>
  </div>
  <div fxLayout="column" fxLayoutAlign="space-between center">
    <p-checkbox
      value="upper"
      label="アルファベット(大文字)"
      [formControl]="optionForm"
    ></p-checkbox>
    <p-checkbox
      value="lower"
      label="アルファベット(小文字)"
      [formControl]="optionForm"
    ></p-checkbox>
    <p-checkbox
      value="number"
      label="数字"
      [formControl]="optionForm"
    ></p-checkbox>
    <p-checkbox
      value="underBar"
      label="アンダーバー"
      [formControl]="optionForm"
    ></p-checkbox>
    <p-checkbox
      value="hyphen"
      label="ハイフン"
      [formControl]="optionForm"
    ></p-checkbox>
  </div>
</div>
